<!DOGTYPE html>
    <html lang="ja">

    <head>

        <title>MAHARANI</title>
        <style>
            @font-face {
                font-family: 'MyRoboto';
                src: url('Roboto-Bold.ttf') format('truetype');
            }

            body {
                font-family: 'MyRoboto', sans-serif;
                background: #111;
                color: #fff;
                text-align: center;
                max-width: 500px;
                margin: 0 auto;
                padding: 20px;
                line-height: 1.8;

                display: flex;
                flex-direction: column;
                justify-content: center;
                min-height: 90vh;
                /*画面の高さいっぱいに使う設定 */
            }

            .main-img {
                width: 180px;
                height: auto;
                margin: 20px auto 5px;
                display: block;
            }

            h1 {
                color: #ff8844;
                font-size: 2.8rem;
                margin-top: 0;
                margin-bottom: 5px;
            }

            p {
                margin: 10px 0;
                color: #e0e0e0;
            }

            .litlink-btn {
                display: inline-block;
                background: linear-gradient(45deg, #ff7e5f, #feb47b);
                /* リットリンク風グラデ */
                color: #fff;
                text-decoration: none;
                font-weight: bold;
                padding: 16px 30px;
                border-radius: 25px;
                margin: 30px 0;
                width: 80%;
                font-size: 0.95rem;
                letter-spacing: 1px;
                box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
                margin-top: 30px;
                margin-bottom: 30px;
                margin-left: auto;
                margin-right: auto;
            }

            .legal-link {
                display: inline-block;
                color: #555;
                font-size: 0.85rem;
                text-decoration: underline;
                margin-top: 60px;
                cursor: pointer;
            }

            /* アコーディオンの仕組み */
            .legal-content {
                display: none;
                background: #1a1a1a;
                padding: 20px;
                margin-top: 20px;
                border-radius: 8px;
                text-align: left;
            }

            .legal-content:target {
                display: block;
            }

            .legal-img {
                max-width: 100%;
                height: auto;
                margin-top: 15px;
                border: 1px solid #333
            }
        </style>
    </head>
    <!-- 右クリックや長押しでの文字・画像コピーを簡易禁止 -->
